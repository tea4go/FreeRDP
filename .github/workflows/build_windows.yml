name: build_windows

on:
  workflow_dispatch:
    branches: [ master, stable* ]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    name: "在 Windows 上构建 FreeRDP"

    steps:
      - name: "检出源代码"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "安装依赖 (vcpkg)"
        shell: pwsh
        run: |
          # 安装 vcpkg 并集成
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          C:\vcpkg\vcpkg.exe integrate install
          # 安装 FreeRDP 所需的依赖
          C:\vcpkg\vcpkg.exe install openssl:x64-windows-static zlib:x64-windows-static --triplet x64-windows-static

      - name: "配置 CMake"
        shell: pwsh
        run: |
          cmake -G "Visual Studio 17 2022" -A x64 `
            -B build `
            -S . `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DWITH_SERVER=ON `
            -DWITH_SAMPLE=ON `
            -DWITH_SHADOW=OFF `
            -DWITH_PLATFORM_SERVER=OFF `
            -DWITH_CLIENT_SDL=OFF `
            -DWITH_PROXY_MODULES=ON `
            -DWITH_FFMPEG=OFF `
            -DWITH_SWSCALE=OFF `
            -DWITH_WEBVIEW=OFF `
            -DOPENSSL_USE_STATIC_LIBS=ON `
            -DZLIB_USE_STATIC_LIBS=ON `
            -DCHANNEL_URBDRC=OFF `
            -DBUILD_TESTING=OFF `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\install"

      - name: "编译 FreeRDP"
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS

      - name: "安装到输出目录"
        shell: pwsh
        run: |
          cmake --install build --config Release

      - name: "验证生成的可执行文件"
        shell: pwsh
        run: |
          Write-Host "=== 检查安装目录 ==="
          Get-ChildItem -Path "${{ github.workspace }}\install" -Recurse -Filter "*.exe" | ForEach-Object {
            Write-Host "找到可执行文件: $($_.FullName)"
          }
          Write-Host "=== 测试 wfreerdp.exe 版本 ==="
          $wfreerdp = Get-ChildItem -Path "${{ github.workspace }}\install" -Recurse -Filter "wfreerdp.exe" | Select-Object -First 1
          if ($wfreerdp) {
            & $wfreerdp.FullName /version
          } else {
            Write-Warning "未找到 wfreerdp.exe，检查 build\client\Windows 目录"
            Get-ChildItem -Path "${{ github.workspace }}\build" -Recurse -Filter "*.exe" | Select-Object -First 10
          }

      - name: "打包构建产物"
        shell: pwsh
        run: |
          $version = (git describe --tags --always --dirty 2>$null)
          if (-not $version) { $version = "dev-$(git rev-parse --short HEAD)" }
          Write-Host "版本: $version"
          echo "BUILD_VERSION=$version" >> $env:GITHUB_ENV

          # 收集所有 exe 和必要的 dll
          $outDir = "release-package"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          # 从 install 目录复制
          if (Test-Path "${{ github.workspace }}\install\bin") {
            Copy-Item -Path "${{ github.workspace }}\install\bin\*" -Destination $outDir -Recurse -Force
          }

          # 从 build 目录搜索所有 exe
          Get-ChildItem -Path "${{ github.workspace }}\build" -Recurse -Filter "*.exe" | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $outDir -Force
            Write-Host "已复制: $($_.Name)"
          }

          # 列出打包内容
          Write-Host "=== 打包内容 ==="
          Get-ChildItem -Path $outDir | ForEach-Object { Write-Host "  $($_.Name)" }

          # 创建 ZIP 压缩包
          $zipName = "FreeRDP-$version-windows-x64.zip"
          Compress-Archive -Path "$outDir\*" -DestinationPath $zipName -Force
          Write-Host "已创建压缩包: $zipName"
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: "上传构建产物"
        uses: actions/upload-artifact@v4
        with:
          name: FreeRDP-windows-x64-${{ env.BUILD_VERSION }}
          path: |
            ${{ env.ZIP_NAME }}
            install/

      - name: "创建 GitHub Release (仅 tag 触发时)"
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "FreeRDP ${{ env.BUILD_VERSION }} Windows x64"
          body: |
            ## FreeRDP Windows x64 构建

            ### 包含内容
            - `wfreerdp.exe` - FreeRDP Windows 命令行客户端
            - 其他可执行工具

            ### 系统要求
            - Windows 10 / Windows 11 (x64)

            ### 构建信息
            - 版本: ${{ env.BUILD_VERSION }}
            - 构建时间: ${{ github.run_started_at }}
            - 提交: ${{ github.sha }}
            - 静态链接 (无需额外运行时)
          files: |
            ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
